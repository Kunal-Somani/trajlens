name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: uv pip install --system ruff
      - name: ruff format check
        run: ruff format --check src/ tests/
      - name: ruff lint
        run: ruff check src/ tests/

  # ── 2. Type check ──────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + dev deps
        run: |
          uv pip install --system -e ".[dev]"
      - name: mypy
        run: mypy src/

  # ── 3. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + dev deps
        run: uv pip install --system -e ".[dev]"
      - name: pytest
        # -m 'not integration' excludes Hub-hitting tests from the standard run
        run: pytest -m "not integration" --cov=src/trajlens --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: matrix.python-version == '3.12'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── 4. Security ────────────────────────────────────────────────────────────
  security:
    name: Security (pip-audit + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package + audit tools
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pip-audit bandit
      - name: pip-audit (no known CVEs in third-party deps)
        run: pip-audit --strict .
      - name: bandit (static security lint)
        run: bandit -ll -r src/trajlens/

  # ── 5. Build smoke test ────────────────────────────────────────────────────
  build:
    name: Build + smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          uv pip install --system hatchling
          python -m hatchling build
      - name: Install from wheel into clean venv
        run: |
          uv venv /tmp/smoke-venv
          uv pip install --python /tmp/smoke-venv/bin/python dist/*.whl
      - name: Smoke test — version
        run: /tmp/smoke-venv/bin/trajlens --version
